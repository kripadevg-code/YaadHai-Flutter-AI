name: yaad_hai_workspace

packages:
  - .
  - apps/**
  - packages/**

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  get:
    run: fvm flutter pub get
    description: Get dependencies for all workspace packages.

  analyze:
    run: fvm flutter analyze
    description: Run static analysis with the pinned FVM Flutter SDK.

  test:
    run: fvm flutter test
    description: Run Flutter tests with the pinned FVM Flutter SDK.

  format:
    run: fvm dart format .
    description: Format Dart sources with the pinned FVM Dart SDK.

  build_runner:
    run: fvm dart run build_runner build --delete-conflicting-outputs
    description: Regenerate Drift and other build_runner outputs.

  run:
    run: fvm flutter run
    description: Run the YaadHai app from the root package.
sdkPath: .fvm/flutter_sdk
